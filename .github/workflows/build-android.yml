name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'android-monitor/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Show SDK state
        run: |
          echo "Platforms:" && ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "(none)"
          echo "Build-tools:" && ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "(none)"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-monitor/**/*.gradle*', 'android-monitor/**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Bootstrap Gradle wrapper
        working-directory: android-monitor
        run: |
          GRADLE_VERSION=8.4
          curl -sL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION} --no-daemon
          chmod +x gradlew

      - name: Build debug APK
        working-directory: android-monitor
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log
          echo "BUILD_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle.log
          retention-days: 7

      - name: Print error if failed
        if: env.BUILD_EXIT != '0'
        run: |
          echo "=== FIRST 100 LINES ==="
          head -100 /tmp/gradle.log
          echo "=== WHAT WENT WRONG ==="
          grep -A 20 "What went wrong" /tmp/gradle.log || true
          exit 1

      - name: Upload APK
        if: env.BUILD_EXIT == '0'
        uses: actions/upload-artifact@v4
        with:
          name: MySpeedMonitor-APK
          path: android-monitor/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: env.BUILD_EXIT == '0' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.run_number }}
          name: MySpeed Monitor APK (build ${{ github.run_number }})
          body: |
            Android APK — build ${{ github.run_number }} from ${{ github.sha }}.
            Enable *Install from unknown sources* to install.
          files: android-monitor/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
