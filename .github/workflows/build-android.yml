name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'android-monitor/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-monitor/**/*.gradle*', 'android-monitor/**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Generate Gradle wrapper JAR
        working-directory: android-monitor
        run: |
          GRADLE_VERSION=8.7
          GRADLE_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          curl -sL "$GRADLE_URL" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          chmod +x /tmp/gradle/gradle-${GRADLE_VERSION}/bin/gradle
          /tmp/gradle/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}
          chmod +x gradlew

      - name: Diagnose environment
        run: |
          echo "=== Java version ===" && java -version
          echo "=== Android SDK ===" && ls $ANDROID_HOME/platforms/ || true
          echo "=== Build tools ===" && ls $ANDROID_HOME/build-tools/ || true

      - name: Build debug APK
        working-directory: android-monitor
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo ""
            echo "========== GRADLE ERROR SUMMARY =========="
            grep -E "^(FAILURE|> |Caused by:|Execution failed|error:|e:)" /tmp/gradle.log | head -40
            echo "=========================================="
            exit $EXIT
          fi

      - name: Locate debug APK
        id: apk
        working-directory: android-monitor
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found, listing build outputs:"
            find app/build/outputs/ 2>/dev/null || echo "(no outputs)"
            exit 1
          fi
          echo "Found: $APK"
          cp "$APK" app/build/outputs/apk/debug/MySpeedMonitor-debug.apk
          echo "path=android-monitor/app/build/outputs/apk/debug/MySpeedMonitor-debug.apk" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MySpeedMonitor-APK
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release on main
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.run_number }}
          name: MySpeed Monitor APK (build ${{ github.run_number }})
          body: |
            Automated Android APK build from commit ${{ github.sha }}.

            > **Debug build** — enable *Install from unknown sources* to install.

            **Install:**
            1. Download `MySpeedMonitor-debug.apk`
            2. Enable *Settings → Security → Install unknown apps*
            3. Open the APK to install
            4. Enter your MySpeed server URL and enable monitoring
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
