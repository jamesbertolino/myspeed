name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'android-monitor/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-monitor/**/*.gradle*', 'android-monitor/**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Generate Gradle wrapper JAR
        working-directory: android-monitor
        run: |
          # Bootstrap: use system gradle to generate proper wrapper jar
          GRADLE_VERSION=8.7
          GRADLE_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          curl -sL "$GRADLE_URL" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          chmod +x /tmp/gradle/gradle-${GRADLE_VERSION}/bin/gradle
          /tmp/gradle/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}
          chmod +x gradlew

      - name: Build release APK
        working-directory: android-monitor
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -100

      - name: Sign APK (debug keystore for distribution)
        working-directory: android-monitor
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storepass android -keypass android
          # Find apksigner regardless of exact build-tools version
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort -V | tail -1)
          "$APKSIGNER" sign \
            --ks debug.keystore --ks-key-alias androiddebugkey \
            --ks-pass pass:android --key-pass pass:android \
            --out app/build/outputs/apk/release/MySpeedMonitor-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MySpeedMonitor-APK
          path: android-monitor/app/build/outputs/apk/release/MySpeedMonitor-signed.apk
          retention-days: 30

      - name: Create GitHub Release on main
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.run_number }}
          name: MySpeed Monitor APK (build ${{ github.run_number }})
          body: |
            Automated Android APK build from commit ${{ github.sha }}.

            **Install:**
            1. Download `MySpeedMonitor-signed.apk`
            2. Enable *Install from unknown sources* on your Android device
            3. Open the APK to install
            4. Enter your MySpeed server URL and enable monitoring
          files: android-monitor/app/build/outputs/apk/release/MySpeedMonitor-signed.apk
          draft: false
          prerelease: false
